<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style-cadastro.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
</head>
<body>
    <div class="card-form">
        <a href="#" id="btnBack" class="back" onclick="localStorage.removeItem('editProduct')">← Voltar</a>
        
        <h2 id="formTitle">Cadastro de Produto</h2>
        <form id="productForm">
            <div class="field">
                <label>Nome</label>
                <input type="text" id="nome" maxlength="40" required>
            </div>
            <div class="grid-2">
                <div class="field">
                    <label>Preço</label>
                    <input type="number" id="preco" step="0.01" max="999999" oninput="if(value.length>8)value=value.slice(0,8)" required>
                </div>
                <div class="field">
                    <label>Categoria</label>
                    <input type="text" id="categoria" maxlength="20" required>
                </div>
            </div>
            <div class="field">
                <label>Descrição</label>
                <textarea id="descricao" rows="4" maxlength="150" required></textarea>
            </div>
            <button type="submit" id="btnSubmit">Finalizar Cadastro</button>
        </form>
    </div>
    <script src="script-cadastro.js"></script>
</body>
</html>
